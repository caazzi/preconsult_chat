name: PreConsult CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_ID: securemed-chat-494521
  REGION: southamerica-east1
  SERVICE_NAME: preconsult
  AR_REPO: securemed-repo
  WIF_PROVIDER: projects/811607528687/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-deploy-sa@securemed-chat-494521.iam.gserviceaccount.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Unit Tests & Linting
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
    
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ env.WIF_PROVIDER }}
        service_account: ${{ env.SERVICE_ACCOUNT }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.11"
        enable-cache: true
        
    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Run linting
      run: |
        uv run ruff check . || echo "Ruff failed, but continuing for now."

    - name: Run tests with pytest
      env:
        PRECONSULT_API_KEY: ci_test_key_123
      run: |
        uv run pytest tests/ -v

  deploy:
    name: Deploy to Cloud Run
    needs: test
    # Only run deploy on push to main or manual dispatch
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          build-args: |
            API_URL=https://pre-consult.org
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          env_vars: |
            API_BASE_URL=https://pre-consult.org
            VERTEX_AI_REGION=us-central1
          secrets: |
            REDIS_URL=REDIS_URL:latest
            PRECONSULT_API_KEY=SECUREMED_API_KEY:latest
          flags: |
            --allow-unauthenticated
            --max-instances=5
            --min-instances=1
            --concurrency=80
            --cpu=1
            --memory=1Gi

  smoke-test:
    name: Smoke Test Deployed Endpoint
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Get Cloud Run URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Run Multi-Stage Smoke Tests
        env:
          BASE_URL: ${{ steps.url.outputs.url }}
        run: |
          # 1. Warm-up and Liveness check
          echo "==== Stage 1: Liveness / Health Check ===="
          HEALTH_URL="${BASE_URL}/health"
          SUCCESS=false
          for i in {1..5}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL"             --connect-timeout 5 --max-time 30)
            echo "Health ping $i: HTTP Status $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              SUCCESS=true
              break
            fi
            echo "Waiting 10 seconds for service to warm up..."
            sleep 10
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "::error::Liveness check failed! Service is unreachable."
            exit 1
          fi

          # 2. Get API Key from GCP Secret Manager
          echo "==== Stage 2: Retrieve API Key ===="
          API_KEY=$(gcloud secrets versions access latest --secret="SECUREMED_API_KEY")
          if [ -z "$API_KEY" ]; then
            echo "::error::Failed to retrieve SECUREMED_API_KEY from Secret Manager"
            exit 1
          fi
          echo "API Key retrieved successfully."

          # 3. Session Initialization Test
          echo "==== Stage 3: Session Initialization ===="
          INIT_PAYLOAD='{
            "age_bracket": "26-35",
            "sex": "Female",
            "lang": "en",
            "specialist": "Cardiology",
            "chief_complaint": "Chest pain for smoke test",
            "duration": "Days",
            "complaint_detail": "Mild pain",
            "conditions": [],
            "medications": [],
            "allergies": "",
            "family_history": [],
            "smoking": "Never",
            "alcohol": "Rarely"
          }'

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${BASE_URL}/api/session/init" \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: ${API_KEY}" \
            -d "$INIT_PAYLOAD" \
            --connect-timeout 5 --max-time 30)

          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n 1 | cut -d':' -f2)

          echo "Init Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Session initialization failed!"
            echo "Response Body: $RESPONSE_BODY"
            exit 1
          fi

          SESSION_ID=$(echo "$RESPONSE_BODY" | jq -r '.session_id')
          if [ -z "$SESSION_ID" ] || [ "$SESSION_ID" = "null" ]; then
            echo "::error::Failed to parse session_id from response!"
            echo "Response Body: $RESPONSE_BODY"
            exit 1
          fi
          echo "Session initialized successfully with ID: $SESSION_ID"

          # 4. Stream Validation Test
          echo "==== Stage 4: AI Question Stream Validation ===="
          STREAM_PAYLOAD=$(printf '{"session_id": "%s"}' "$SESSION_ID")
          
          STREAM_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${BASE_URL}/api/interview-questions-stream" \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: ${API_KEY}" \
            -d "$STREAM_PAYLOAD" \
            --connect-timeout 5 --max-time 45)

          STREAM_BODY=$(echo "$STREAM_RESPONSE" | sed '$d')
          STREAM_STATUS=$(echo "$STREAM_RESPONSE" | tail -n 1 | cut -d':' -f2)

          echo "Stream HTTP Status: $STREAM_STATUS"
          if [ "$STREAM_STATUS" != "200" ]; then
            echo "::error::Stream endpoint failed!"
            echo "Response Body: $STREAM_BODY"
            exit 1
          fi

          if [[ "$STREAM_BODY" != *"data:"* ]]; then
            echo "::error::Stream body is invalid! Missing 'data:' event format."
            echo "Response Body: $STREAM_BODY"
            exit 1
          fi

          echo "First 150 characters of stream payload:"
          echo "${STREAM_BODY}" | head -c 150
          echo ""
          echo "==== Smoke Test Passed Successfully! ===="
